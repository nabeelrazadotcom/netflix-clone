<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>curve</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: darkcyan;
        }

        .major {
            box-sizing: border-box;
            overflow-x: hidden;
            position: relative;
            height: 6.25rem;
            z-index: 1;
            width: 100vw;
        }

        .container {
            width: 100vw;
            height: 6.25rem;
        }

        .curve {
            box-sizing: border-box;
            background-color: black;
            border-top: 0.25rem solid transparent;
            height: 100%;
            width: 130%;
            position: relative;
            border-top-right-radius: 50% 100%;
            border-top-left-radius: 50% 100%;
            background-clip: padding-box;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        .curve::before {
            content: '';
            background-color: yellow;
            border: none;
            border-radius: inherit;
            position: absolute;
            z-index: -1;
            inset: 0;
            margin-top: -.25rem;
        }
    </style>
</head>
<body>
    <div class="major">
        <div class="container">
            <div class="curve"></div>
        </div>
    </div>
</body>
</html>
